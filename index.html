<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Joke Generator</h1>
    <p class="subtitle">Get random jokes to brighten your day!</p>

    <div id="joke-box">
      <div id="card-inner">
        <div id="card-front">
          <p id="joke-text">Click Generate to get a joke!</p>
        </div>
        <div id="card-back">
          <p id="answer-text"></p>
        </div>
      </div>
      <button id="reveal-btn" style="visibility:hidden;">Reveal Answer</button>
    </div>

    <button id="joke-btn">Generate</button>

    <script src="script.js"></script>
  </body>
</html>
